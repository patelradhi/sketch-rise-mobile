<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer floor plan border -->
  <rect x="6" y="10" width="52" height="44" rx="3" stroke="#6366f1" stroke-width="3" fill="none"/>

  <!-- Room dividers -->
  <line x1="32" y1="10" x2="32" y2="36" stroke="#6366f1" stroke-width="2.5"/>
  <line x1="6" y1="36" x2="52" y2="36" stroke="#6366f1" stroke-width="2.5"/>

  <!-- Door arc (bottom-left room) -->
  <path d="M18 36 Q18 44 26 44" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Door arc (top-right room) -->
  <path d="M44 10 Q44 18 52 18" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Window top -->
  <line x1="14" y1="10" x2="24" y2="10" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>

  <!-- Window right -->
  <line x1="58" y1="22" x2="58" y2="30" stroke="#a5b4fc" stroke-width="3" stroke-linecap="round"/>

  <!-- Rising arrow — the "Rise" in SketchRise -->
  <path d="M46 48 L52 42 L58 48" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="52" y1="42" x2="52" y2="54" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
</svg>
